<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MiniOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@400;500&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0f14;
      --sidebar:   #111318;
      --surface:   #161920;
      --surface2:  #1d2029;
      --border:    #252830;
      --border2:   #2e3340;
      --text:      #dde3f0;
      --text2:     #8b93a8;
      --text3:     #555d72;
      --accent:    #4f8ef7;
      --accent-bg: rgba(79,142,247,0.10);
      --green:     #3ecf8e;
      --red:       #f05f5f;
      --yellow:    #f0c14f;
      --purple:    #a78bfa;
      --pink:      #f472b6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Titlebar */
    .titlebar {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .titlebar-left { display: flex; align-items: center; gap: 12px; -webkit-app-region: no-drag; }
    .logo { font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; color: var(--text); }
    .logo span { color: var(--accent); }
    .titlebar-clock { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); }
    .titlebar-right { display: flex; align-items: center; gap: 6px; -webkit-app-region: no-drag; }
    .tb-btn {
      height: 26px; padding: 0 10px;
      border: 1px solid var(--border2); border-radius: 6px;
      background: var(--surface2); color: var(--text2);
      font-family: 'Figtree', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, color 0.15s;
      display: flex; align-items: center; gap: 4px;
    }
    .tb-btn:hover { background: var(--border2); color: var(--text); }
    .tb-btn.danger { border-color: rgba(240,95,95,0.3); color: var(--red); }
    .tb-btn.danger:hover { background: rgba(240,95,95,0.12); }

    /* Layout */
    .workspace { flex: 1; display: flex; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 250px; flex-shrink: 0;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header { padding: 10px 10px 8px; border-bottom: 1px solid var(--border); }
    .search-box {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border2); border-radius: 8px;
      padding: 7px 10px; color: var(--text);
      font-family: 'Figtree', sans-serif; font-size: 13px; outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text3); }

    .tag-filters {
      display: flex; gap: 5px; flex-wrap: wrap;
      padding: 8px 10px; border-bottom: 1px solid var(--border);
    }
    .tag-chip {
      font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 20px;
      cursor: pointer; border: 1px solid transparent;
      transition: all 0.15s; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .tag-chip[data-filter="all"]    { background: rgba(79,142,247,0.1);  color: var(--accent); border-color: rgba(79,142,247,0.2); }
    .tag-chip[data-filter="all"].active { background: var(--accent); color: #fff; }
    .tag-chip[data-filter="pinned"] { background: rgba(240,193,79,0.1);  color: var(--yellow); border-color: rgba(240,193,79,0.2); }
    .tag-chip[data-filter="pinned"].active { background: var(--yellow); color: #000; }
    .tag-chip[data-filter="work"]   { background: rgba(62,207,142,0.1);  color: var(--green);  border-color: rgba(62,207,142,0.2); }
    .tag-chip[data-filter="work"].active   { background: var(--green); color: #000; }
    .tag-chip[data-filter="perso"]  { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.2); }
    .tag-chip[data-filter="perso"].active  { background: var(--purple); color: #fff; }
    .tag-chip[data-filter="idée"]   { background: rgba(244,114,182,0.1); color: var(--pink);   border-color: rgba(244,114,182,0.2); }
    .tag-chip[data-filter="idée"].active   { background: var(--pink); color: #fff; }

    .note-count { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; padding: 6px 12px 2px; }

    .notes-list {
      flex: 1; overflow-y: auto; padding: 4px 8px;
      scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
    }
    .note-item {
      padding: 9px 10px; border-radius: 8px;
      cursor: pointer; transition: background 0.12s;
      border: 1px solid transparent; margin-bottom: 2px;
    }
    .note-item:hover { background: var(--surface2); }
    .note-item.active { background: var(--accent-bg); border-color: rgba(79,142,247,0.25); }
    .note-item-title {
      font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
    }
    .note-item-preview { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item-meta { display: flex; align-items: center; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
    .note-tag {
      font-size: 9px; font-weight: 700;
      padding: 2px 6px; border-radius: 10px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .note-tag.work   { background: rgba(62,207,142,0.15); color: var(--green); }
    .note-tag.perso  { background: rgba(167,139,250,0.15); color: var(--purple); }
    .note-tag.idée   { background: rgba(244,114,182,0.15); color: var(--pink); }
    .note-tag.pinned { background: rgba(240,193,79,0.15); color: var(--yellow); }
    .note-date { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

    .sidebar-footer { padding: 10px; border-top: 1px solid var(--border); }
    .new-note-btn {
      width: 100%; padding: 9px;
      background: var(--accent); color: white;
      border: none; border-radius: 8px;
      font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .new-note-btn:hover { background: #6aa0ff; }
    .new-note-btn:active { transform: scale(0.98); }

    /* Editor */
    .editor-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--surface); }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; color: var(--text3);
    }
    .empty-state-icon { font-size: 36px; opacity: 0.35; }
    .empty-state p { font-family: 'Fraunces', serif; font-style: italic; font-size: 14px; }

    .editor-inner { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

    .editor-toolbar {
      display: flex; align-items: center; gap: 3px;
      padding: 7px 16px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; background: var(--surface); flex-shrink: 0;
    }
    .tool-sep { width: 1px; height: 18px; background: var(--border2); margin: 0 3px; }
    .tool-btn {
      min-width: 28px; height: 28px; padding: 0 6px;
      border: none; border-radius: 6px;
      background: transparent; color: var(--text2);
      font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
      font-family: 'JetBrains Mono', monospace; font-weight: 500;
    }
    .tool-btn:hover { background: var(--surface2); color: var(--text); }
    .tool-btn.active { background: var(--accent-bg); color: var(--accent); }
    .tag-select {
      height: 28px; padding: 0 8px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 6px; color: var(--text2);
      font-family: 'Figtree', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; outline: none;
    }
    .save-btn {
      padding: 0 12px; background: var(--accent); color: white;
      font-family: 'Figtree', sans-serif; font-size: 12px; font-weight: 700;
    }
    .save-btn:hover { background: #6aa0ff; color: white; }
    .del-btn { color: var(--red); padding: 0 10px; font-family: 'Figtree', sans-serif; font-size: 12px; font-weight: 600; }
    .del-btn:hover { background: rgba(240,95,95,0.1); color: var(--red); }
    .saved-flash {
      font-size: 11px; color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      opacity: 0; transition: opacity 0.3s; margin-left: 4px;
    }
    .saved-flash.show { opacity: 1; }

    .editor-title-row {
      padding: 18px 24px 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #noteTitle {
      width: 100%; background: transparent; border: none;
      color: var(--text); font-family: 'Fraunces', serif;
      font-size: 24px; font-weight: 600; letter-spacing: -0.02em; outline: none;
    }
    #noteTitle::placeholder { color: var(--text3); }

    .editor-body {
      flex: 1; overflow-y: auto; padding: 16px 24px 32px;
      scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
    }
    #noteEditor {
      width: 100%; min-height: 100%;
      background: transparent; border: none;
      color: var(--text); font-family: 'Figtree', sans-serif;
      font-size: 14px; line-height: 1.8; outline: none;
    }
    #noteEditor:empty::before {
      content: attr(data-placeholder); color: var(--text3);
      pointer-events: none; display: block;
    }
    #noteEditor h1 { font-family: 'Fraunces', serif; font-size: 22px; margin: 16px 0 8px; font-weight: 600; }
    #noteEditor h2 { font-family: 'Fraunces', serif; font-size: 17px; margin: 12px 0 6px; font-weight: 600; color: var(--text2); }
    #noteEditor ul, #noteEditor ol { padding-left: 22px; margin: 6px 0; }
    #noteEditor li { margin-bottom: 3px; }
    #noteEditor blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 0 4px 14px;
      color: var(--text2); font-style: italic; margin: 10px 0;
    }
    #noteEditor code {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      background: var(--surface2); padding: 2px 6px;
      border-radius: 4px; color: var(--purple);
    }
    #noteEditor a { color: var(--accent); }
    #noteEditor mark { background: rgba(240,193,79,0.25); color: var(--yellow); border-radius: 2px; padding: 0 2px; }
    .update-popup {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: none;
}

.update-box {
  background: #111116;
  border: 1px solid #2e2e40;
  padding: 16px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  width: 260px;
}

.update-title {
  font-weight: 700;
  margin-bottom: 6px;
}

.update-text {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
}

#restartBtn {
  width: 100%;
  background: #7c6dfa;
  border: none;
  color: white;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
}
.titlebar {
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  background: rgba(17, 19, 24, 0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  -webkit-app-region: drag;
}

.titlebar-left {
  display: flex;
  align-items: center;
  gap: 14px;
  -webkit-app-region: no-drag;
}

.logo {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.logo span {
  color: var(--accent);
}

.titlebar-datetime {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 2px 10px;
  border-left: 1px solid var(--border);
  margin-left: 6px;
}

#clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
}

#date {
  font-size: 11px;
  color: var(--text2);
  text-transform: capitalize;
  margin-top: 1px;
  letter-spacing: 0.3px;
}

/* Centre title plus "app premium" */
.titlebar-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  -webkit-app-region: no-drag;
  display: flex;
  align-items: center;
}

.titlebar-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--text2);
  padding: 4px 10px;
  border: 1px solid var(--border2);
  border-radius: 999px;
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(6px);
}

.titlebar-right {
  display: flex;
  align-items: center;
  gap: 6px;
  -webkit-app-region: no-drag;
}

.tb-btn {
  width: 34px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  transition: 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

.tb-btn:hover {
  background: var(--border2);
  color: var(--text);
}

.tb-btn.danger {
  color: var(--red);
  border-color: rgba(240,95,95,0.25);
}

.tb-btn.danger:hover {
  background: rgba(240,95,95,0.12);
}
  </style>
</head>
<body>


  <div class="titlebar-datetime">
    <div class="clock" id="clock">--:--</div>
    <div class="date" id="date">---</div>
  </div>
</div>

<div class="titlebar-center">
  <div class="titlebar-title">Notes</div>
</div>

 <div class="titlebar-right">

  <button class="tb-btn" id="newWinBtn">➕</button>

  <button class="tb-btn" id="calcBtn">🧮</button>

  <button class="tb-btn" id="gameBtn">🎮</button>

  <button class="tb-btn" id="toggleMaxBtn">⛶</button>

  <button class="tb-btn danger" id="closeAppBtn">✕</button>

</div>
</div>
  <div id="updatePopup" class="update-popup">
  <div class="update-box">
    <div class="update-title">Nouvelle version prête 🚀</div>
    <div class="update-text">Redémarrer pour appliquer la mise à jour</div>
    <button id="restartBtn">Redémarrer</button>
  </div>
</div>

  <div class="workspace">

    <div class="sidebar">
      <div class="sidebar-header">
        <input class="search-box" id="search" placeholder="🔍  Rechercher...">
      </div>
      <div class="tag-filters">
        <span class="tag-chip active" data-filter="all">Tout</span>
        <span class="tag-chip" data-filter="pinned">📌</span>
        <span class="tag-chip" data-filter="work">Travail</span>
        <span class="tag-chip" data-filter="perso">Perso</span>
        <span class="tag-chip" data-filter="idée">Idée</span>
      </div>
      <div class="note-count" id="noteCount">0 note</div>
      <div class="notes-list" id="notesList"></div>
      <div class="sidebar-footer">
        <button class="new-note-btn" id="newNoteBtn">+ Nouvelle note</button>
      </div>
    </div>

    <div class="editor-pane">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">📝</div>
        <p>Sélectionnez ou créez une note</p>
      </div>

      <div class="editor-inner" id="editorInner" style="display:none">
        <div class="editor-toolbar">
          <button class="tool-btn" data-cmd="bold" title="Gras"><b>B</b></button>
          <button class="tool-btn" data-cmd="italic" title="Italique"><i>I</i></button>
          <button class="tool-btn" data-cmd="underline" title="Souligné"><u>U</u></button>
          <button class="tool-btn" data-cmd="strikeThrough" title="Barré"><s>S</s></button>
          <div class="tool-sep"></div>
          <button class="tool-btn" data-cmd="insertUnorderedList" title="Liste">≡</button>
          <button class="tool-btn" data-cmd="insertOrderedList" title="Liste numérotée">1.</button>
          <div class="tool-sep"></div>
          <button class="tool-btn" data-cmd="h1" title="Titre 1">H1</button>
          <button class="tool-btn" data-cmd="h2" title="Titre 2">H2</button>
          <button class="tool-btn" data-cmd="quote" title="Citation">❝</button>
          <div class="tool-sep"></div>
          <button class="tool-btn" data-cmd="hilite" title="Surligner">🖊</button>
          <button class="tool-btn" data-cmd="removeFormat" title="Effacer format">✕f</button>
          <div class="tool-sep"></div>
          <select class="tag-select" id="tagSelect">
            <option value="">— Tag —</option>
            <option value="work">💼 Travail</option>
            <option value="perso">👤 Perso</option>
            <option value="idée">💡 Idée</option>
          </select>
          <button class="tool-btn" id="pinBtn" title="Épingler">📌</button>
          <span class="saved-flash" id="savedFlash">✓ sauvegardé</span>
          <div style="flex:1"></div>
          <button class="tool-btn del-btn" id="deleteNoteBtn">🗑 Supprimer</button>
          <button class="tool-btn save-btn" id="saveNoteBtn">Enregistrer</button>
        </div>

        <div class="editor-title-row">
          <input id="noteTitle" placeholder="Titre de la note..." maxlength="100">
        </div>

        <div class="editor-body">
          <div id="noteEditor" contenteditable="true"
               data-placeholder="Commencez à écrire... (Ctrl+B gras, Ctrl+I italique, Ctrl+S sauvegarder)"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
