<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniOS 🧠</title>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: #0f172a;
      color: #e5eefc;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #111827;
      border-bottom: 1px solid #22304d;
    }

    .wrap {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 16px;
      padding: 16px;
      flex: 1;
      min-height: 0;
    }

    .card {
      background: #111a2e;
      border: 1px solid #22304d;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #22304d;
      background: #0b1326;
      color: #e5eefc;
      padding: 12px;
      font: inherit;
      outline: none;
      box-sizing: border-box;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .top {
  -webkit-app-region: drag;
  user-select: none;
}

.top button,
.top input,
.top textarea,
.top select,
.top a {
  -webkit-app-region: no-drag;
}

    .primary { background: #5b8cff; color: white; }
    .secondary { background: #1b2740; color: #e5eefc; }
    .danger { background: #ef4444; color: white; }

    .muted {
      color: #8ea0bf;
      font-size: 13px;
    }

    #notes {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: auto;
      max-height: 100%;
      margin-top: 10px;
    }

    .note {
      background: #0b1326;
      border: 1px solid #22304d;
      border-radius: 14px;
      padding: 12px;
    }

    .note-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .note-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .icon {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 10px;
      background: #1b2740;
      color: white;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(91, 140, 255, .14);
      color: #bcd0ff;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .empty {
      padding: 16px;
      border: 1px dashed #32405f;
      border-radius: 14px;
      color: #8ea0bf;
      text-align: center;
      margin-top: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      background: #0b1326;
      border: 1px solid #22304d;
      border-radius: 14px;
      padding: 14px;
    }

    .stat b {
      display: block;
      font-size: 22px;
      margin-top: 6px;
    }

    #savedIndicator {
      opacity: 0;
      transition: .2s;
      color: #9be7b1;
      font-size: 12px;
      margin-top: 8px;
    }

    #savedIndicator.show {
      opacity: 1;
    }

    #clock, #date {
      font-size: 12px;
      color: #8ea0bf;
    }

    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="top">
    <div>
      <div style="font-weight:700">MiniOS</div>
      <div id="clock"></div>
      <div id="date"></div>
    </div>
    <div class="row">
      <button class="secondary" id="newWinBtn" type="button">➕ Fenêtre</button>
      <button class="secondary" id="calcBtn" type="button">🧮 Calculatrice</button>
      <button onclick="openGame()">🎮 Jeu</button>
      <button class="danger" id="closeAppBtn" type="button">✕ Fermer</button>
      <button class="secondary" id="toggleMaxBtn" type="button">🗖</button>
    </div>
  </div>

  <div class="wrap">
    <section class="card">
      <div class="muted">Ajouter une note</div>
      <div style="height:10px"></div>
      <input id="search" placeholder="Rechercher une note...">
      <div style="height:10px"></div>
      <textarea id="text" placeholder="Écris ta note ici..."></textarea>
      <div id="savedIndicator">Sauvegardé</div>
      <div style="height:12px"></div>
      <div class="row">
        <button class="primary" id="saveBtn" type="button">Enregistrer</button>
        <button class="secondary" id="clearBtn" type="button">Effacer</button>
        <button class="secondary" id="pinBtn" type="button">📌 Pinned</button>
      </div>
      <div style="height:18px"></div>
      <div class="muted">Notes</div>
      <div id="empty" class="empty">Aucune note pour le moment.</div>
      <div id="notes"></div>
    </section>

    <aside class="card">
      <div class="muted">Statistiques</div>
      <div style="height:10px"></div>
      <div class="stats">
        <div class="stat"><span class="muted">Notes</span><b id="noteCount">0</b></div>
        <div class="stat"><span class="muted">État</span><b>OK</b></div>
      </div>
      <div style="height:18px"></div>
      <div class="empty">Panneau latéral pour infos et futurs modules.</div>
    </aside>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
