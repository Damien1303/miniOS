<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniOS Calc</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0a0a0c;
  --surface:#111116;
  --border:#222230;
  --text:#e8e8f0;
  --muted:#5a5a72;
  --accent:#7c6dfa;
  --accent2:#a895ff;
}
#gameArea{
  margin:20px;
  height:420px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  position:relative;
  overflow:hidden;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Syne;
  margin:0;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Syne;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* TITLEBAR */
.titlebar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  -webkit-app-region:drag;
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.icon{
  width:26px;height:26px;
  border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#4f3fd4);
  display:flex;
  align-items:center;
  justify-content:center;
}

.clock{
  font-family:DM Mono;
  font-size:11px;
  padding:4px 8px;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--muted);
}

.close{
  -webkit-app-region:no-drag;
  width:26px;height:26px;
  border-radius:8px;
  border:1px solid rgba(255,94,94,0.3);
  background:rgba(255,94,94,0.08);
  color:var(--red);
  cursor:pointer;
}

/* SCREEN */
.screen{
  padding:20px;
  border-bottom:1px solid var(--border);
}

.screen-expr{
  font-family:DM Mono;
  font-size:12px;
  color:var(--muted);
}

.screen-result{
  font-family:DM Mono;
  font-size:38px;
  margin-top:6px;
}

/* OP ROW */
.op-row{
  display:flex;
  border-bottom:1px solid var(--border);
}

.op-tab{
  flex:1;
  padding:10px;
  background:transparent;
  border:none;
  color:var(--muted);
  cursor:pointer;
}

.op-tab.active{
  color:var(--accent2);
  border-bottom:2px solid var(--accent);
}

/* KEYPAD */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:1px;
  background:var(--border);
  height:calc(100vh - 200px);
}

.key{
  background:var(--surface);
  border:none;
  color:var(--text);
  font-size:18px;
  cursor:pointer;
}

.key:hover{background:var(--surface2)}

.equals{
  background:var(--accent);
  color:white;
  font-weight:700;
  grid-row:span 2;
}

/* HISTORY */
.history-strip{
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 10px;
  overflow-x:auto;
}

.history-label{
  font-size:10px;
  color:var(--muted);
}

.history-item{
  font-family:DM Mono;
  font-size:11px;
  padding:4px 8px;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--muted);
  white-space:nowrap;
}

.history-item:hover{
  color:white;
}
</style>
</head>

<body>

<!-- TITLE -->
<div class="titlebar">
  <div class="left">
    <div class="icon">🧮</div>
    <div>MiniOS Calc</div>
    <div class="clock" id="clock">00:00</div>
  </div>
  <button class="close" id="closeCalc">✕</button>
</div>

<!-- SCREEN -->
<div class="screen">
  <div class="screen-expr" id="expr">—</div>
  <div class="screen-result" id="result">0</div>
</div>

<!-- OPS -->
<div class="op-row" id="opRow">
  <button class="op-tab active" data-op="+">+</button>
  <button class="op-tab" data-op="−">−</button>
  <button class="op-tab" data-op="×">×</button>
  <button class="op-tab" data-op="÷">÷</button>
  <button class="op-tab" data-op="%">%</button>
</div>

<!-- KEYS -->
<div class="keypad" id="keypad">

  <button class="key action" data-action="swap">↔</button>
  <button class="key action" data-action="copy">⎘</button>
  <button class="key clear" data-action="clear">C</button>

  <button class="key" data-digit="7">7</button>
  <button class="key" data-digit="8">8</button>
  <button class="key" data-digit="9">9</button>

  <button class="key" data-digit="4">4</button>
  <button class="key" data-digit="5">5</button>
  <button class="key" data-digit="6">6</button>

  <button class="key" data-digit="1">1</button>
  <button class="key" data-digit="2">2</button>
  <button class="key" data-digit="3">3</button>

  <button class="key" data-digit="0">0</button>
  <button class="key" data-digit=".">.</button>
  <button class="key equals" data-action="calc">=</button>

</div>

<!-- HISTORY -->
<div class="history-strip" id="historyStrip">
  <span class="history-label">hist</span>
</div>

<!-- FLASH -->
<div id="copyFlash" class="copy-flash"></div>

<script src="calculator.js"></script>

</body>
</html>
